server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets; Vite emits filenames with content hashes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback so client-side routes (/room/foo, /dashboard) resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
