# Apache virtual host for videoconf.
# ServerName = nip.io wildcard hostname → resolves to VPS IP automatically.
# Handles both port 80 (redirect + Let's Encrypt validation) and 443 (SSL).
# Reverse-proxies:
#   /       → frontend nginx container (127.0.0.1:13000)
#   /api    → backend Go container    (127.0.0.1:18080)
#   /files  → MinIO S3 API            (127.0.0.1:19000)

<VirtualHost *:80>
    ServerName videoconf-103-147-33-34.nip.io

    # Let's Encrypt HTTP-01 challenge path — never redirect this.
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Everything else → HTTPS.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName videoconf-103-147-33-34.nip.io

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/videoconf-103-147-33-34.nip.io/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/videoconf-103-147-33-34.nip.io/privkey.pem

    # WebSocket + long-lived request support (LiveKit signalling won't run through
    # here since LiveKit is Cloud, but chat data channel + fetch use HTTP fine).
    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"

    # File uploads up to 12 MiB (backend caps chat attachments at 10 MiB + slack).
    LimitRequestBody 12582912

    # Backend API
    ProxyPass        /api  http://127.0.0.1:18080/api
    ProxyPassReverse /api  http://127.0.0.1:18080/api

    # MinIO S3 API — public-read buckets, so browsers fetch avatars/attachments directly.
    ProxyPass        /files/  http://127.0.0.1:19000/
    ProxyPassReverse /files/  http://127.0.0.1:19000/

    # Frontend SPA — must come last so /api and /files match first.
    ProxyPass        /  http://127.0.0.1:13000/
    ProxyPassReverse /  http://127.0.0.1:13000/

    ErrorLog  ${APACHE_LOG_DIR}/videoconf_error.log
    CustomLog ${APACHE_LOG_DIR}/videoconf_access.log combined
</VirtualHost>
