# Temporary HTTP-only vhost — used BEFORE Let's Encrypt issues the cert.
# After certbot runs successfully, replace with apache-vhost.conf (which has both :80 and :443).
<VirtualHost *:80>
    ServerName videoconf-103-147-33-34.nip.io

    # Serve Let's Encrypt validation challenges from a webroot.
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # For now, everything else also served over HTTP so we can test end-to-end
    # BEFORE the cert lands. Video call won't work yet but UI can be verified.
    ProxyPreserveHost On
    ProxyRequests Off

    LimitRequestBody 12582912

    ProxyPass        /api  http://127.0.0.1:18080/api
    ProxyPassReverse /api  http://127.0.0.1:18080/api

    ProxyPass        /files/  http://127.0.0.1:19000/
    ProxyPassReverse /files/  http://127.0.0.1:19000/

    ProxyPass        /  http://127.0.0.1:13000/
    ProxyPassReverse /  http://127.0.0.1:13000/

    ErrorLog  ${APACHE_LOG_DIR}/videoconf_error.log
    CustomLog ${APACHE_LOG_DIR}/videoconf_access.log combined
</VirtualHost>
